<HTML>
    <HEAD>
        <TITLE>Memasukkan Input Bilangan</TITLE>
    </HEAD>
    <BODY>
        <FORM NAME="form_kalkulator">
            <H1><BR>Memasukkan Data Lewat Keyboard</H1>
                <PRE>
                    Bilangan Pertama :<input type="text" size="11" name="bilangan1">
                    Bilangan Kedua :<input type="text" size="11" name="bilangan2">
                </PRE>
                <INPUT TYPE="button" value="Jumlahkan" onclick="jumlah()">
                <INPUT TYPE="button" value="pengurangan" onclick="kurang()">
                <INPUT TYPE="button" value="perkalian" onclick="kali()">
                <INPUT TYPE="button" value="pembagian" onclick="bagi()">
                <INPUT TYPE="reset" value="Ulang">
        </FORM>
        <SCRIPT language="JavaScript">
            function jumlah() {
                var bil1 = parseFloat(document.form_kalkulator.bilangan1.value);
                if (isNaN(bil1))
                    bil1 = 0.0;
                var bil2 = parseFloat(document.form_kalkulator.bilangan2.value);
                if (isNaN(bil2))
                    bil2 = 0.0;
                var hasil = bil1 + bil2;
                alert("Hasil Penjumlahan = " +hasil);
            }
            function kurang() {
                var bil1 = parseFloat(document.form_kalkulator.bilangan1.value);
                if (isNaN(bil1))
                    bil1 = 0.0;
                var bil2 = parseFloat(document.form_kalkulator.bilangan2.value);
                if (isNaN(bil2))
                    bil2 = 0.0;
                var hasil = bil1 - bil2;
                alert("Hasil Pengurangan = " +hasil);
            }
            function kali() {
                var bil1 = parseFloat(document.form_kalkulator.bilangan1.value);
                if (isNaN(bil1))
                    bil1 = 0.0;
                var bil2 = parseFloat(document.form_kalkulator.bilangan2.value);
                if (isNaN(bil2))
                    bil2 = 0.0;
                var hasil = bil1 * bil2;
                alert("Hasil Perkalian = " +hasil);
            }
            function bagi() {
                var bil1 = parseFloat(document.form_kalkulator.bilangan1.value);
                if (isNaN(bil1))
                    bil1 = 0.0;
                var bil2 = parseFloat(document.form_kalkulator.bilangan2.value);
                if (isNaN(bil2))
                    bil2 = 0.0;
                var hasil = bil1 / bil2;
                alert("Hasil Pembagian = " +hasil);
                }  
        </SCRIPT>
    </BODY>
</HTML>
